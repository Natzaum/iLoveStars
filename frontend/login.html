<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iLoveStars</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <div class="container-fluid vh-100">
        <div class="row justify-content-center align-items-center h-100">

            <div class="sidebar glass-panel col-12 col-md-6 col-lg-3">
                <div class="planet-wrapper">
                    <div id="mars-scene" class="mars-scene" aria-hidden="true"></div>
                    <div class="planet-copy text-center">
                        <p class="planet-eyebrow">Interactive Planet</p>
                        <h2>Mars Orbit</h2>
                        <p>Explore the red planet while you enter the universe of your favorite stars.</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3 login-column">
                <div class="card shadow glass-panel-login p-3">
                    <form action="../backend/register.php">
                        <div class="card-header mb-3 text-center">
                            <h3>Search for Stars</h3>
                        </div>
                        <div class="card-body">

                            <div class="col-12 mb-3">
                                <label>Email</label>
                                <input class="form-control glass-panel" required>
                            </div>
                            <div class="col-12 mb-3">
                                <label>Password</label>
                                <div class="password-field">
                                    <input type="password" id="password" class="form-control glass-panel" required>
                                    <img id="visibility-on" src="../images/visibility_on.svg" alt="Show password"
                                        onclick="showPassword()">
                                </div>
                            </div>
                        </div>
                        <div class="card-footer text-center">
                            <input type="submit" href="#" class="register-link mb-3" value="Login">
                            <p>or</p>
                            <a href="../frontend/register.html" class="login-link">Register</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="mars-scene.js"></script>
</body>

</html>

<script>
    function showPassword() {
        var password = document.getElementById('password')

        if (password.type === 'password') {
            password.type = 'text'
        } else {
            password.type = 'password'
        }
    }

    if (window.location.search.includes('success=1')) {
        Swal.fire({
            position: "center",
            theme: "dark",
            icon: "success",
            title: "Your user has successfully registered",
            showConfirmButton: false,
            timer: 1500
        });
    }
</script>
